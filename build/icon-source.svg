<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="branch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="64" y="64" width="896" height="896" rx="200" ry="200" fill="url(#bg)"/>
  <!-- Subtle inner shadow -->
  <rect x="64" y="64" width="896" height="896" rx="200" ry="200" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="4"/>
  <!-- Git branch icon - main trunk -->
  <line x1="400" y1="280" x2="400" y2="744" stroke="url(#branch)" stroke-width="56" stroke-linecap="round"/>
  <!-- Branch line -->
  <path d="M400 460 Q400 400 500 360 Q600 320 640 320" stroke="url(#branch)" stroke-width="56" stroke-linecap="round" fill="none"/>
  <!-- Branch line 2 -->
  <path d="M400 600 Q400 540 520 510 Q640 480 680 480" stroke="url(#branch)" stroke-width="56" stroke-linecap="round" fill="none"/>
  <!-- Node dots -->
  <circle cx="400" cy="300" r="38" fill="white"/>
  <circle cx="400" cy="744" r="38" fill="white"/>
  <circle cx="660" cy="320" r="38" fill="white"/>
  <circle cx="700" cy="480" r="38" fill="white"/>
  <!-- Small green safety dot -->
  <circle cx="740" cy="640" r="44" fill="#22c55e"/>
  <circle cx="740" cy="640" r="30" fill="#22c55e" stroke="white" stroke-width="8"/>
</svg>
